name: Deploy Terraform to AWS

on:
#  push:
#    paths:
#      - 'terraform/**'
#    branches:
#      - main
  workflow_dispatch:
    inputs:
      release:
        description: 'Lambda release number in github'
        required: true
        default: 7
      lambda_artifact_name:
        description: 'Lambda artifact name in github'
        required: true
        default: 'khorcha-0.1-all.jar'

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7  # Specify the version you are using

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1  # Replace with your AWS region

      - name: Initialize Terraform
        working-directory: ./terraform
        run: terraform init

      - name: Plan Terraform Changes
        working-directory: ./terraform
        run: terraform plan -var="release=${{ github.event.inputs.release }}" -var="lambda_artifact_name=${{ github.event.inputs.lambda_artifact_name }}" -out=tfplan

      - name: Apply Terraform Changes
        if: github.ref == 'refs/heads/main'
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan
